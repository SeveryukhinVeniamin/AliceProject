<!DOCTYPE html>
<html lang="rus">
    <head>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Статистика пользователя</title>
    </head>
    
    <body>
        <h1>Пользователь "{{user_id}}".</h1>
        <h2>Общее количество запросов - {{number}}.</h2>
        <br>
        <br>

    {% for line in requests %}
        <div class="card">
            <h5 class="card-header">Запрос номер {{loop.index}}.</h5>
            <div class="card-body">
                <h4 class="card-title">Место карты: {{line[0]}}.</h4>
                <h5 class="card-text">{{line[1]}}.</h5>
                <a target="_blank" href="{{line[2]}}" class="card-text">Ссылка на карту.<a/>
            </div>
        </div>
        <br>
        <br>
    {% endfor %}
    </body>
</html>
