{% extends "base.html" %}

{% set title = 'Статистика пользователя' %}
{% block content %}
    <h3>Выберите одного из следующих пользователей.</h3>
    <br>
    <h4>Пользователи ({{number}}):</h4>
    {% for user in list_of_users %}
        <br>
        <a target="_blank" href='/user_statistics/{{user}}' class="card-text">
            <h4>{{user}}</h4>
        </a>
    {% endfor %}
{% endblock %}
